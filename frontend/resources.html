<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Resources – Peer Bridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/shared.css"/>
<style>
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.res-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:12px}
.upload-modal-overlay{position:fixed;inset:0;z-index:50;background:rgba(26,31,58,.25);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px}
</style>
</head>
<body>
<div id="root"></div>
<script src="/js/api.js"></script>
<script>
pb.requireAuth();
const me = pb.getUser();
let resources = [], catFilter = '', searchVal = '', uploading = false, showUpload = false;
const CATS = ['','Past Papers','Course Notes','FYP Resources','Career Guide','Society Guide','Other'];
const TYPE_ICONS = {PDF:'📄',ZIP:'🗜️',DOCX:'📝',XLSX:'📊',PPTX:'📊',PNG:'🖼️',JPG:'🖼️'};

function ic(n,sz=18,col='currentColor',sw=1.7){const p={book:`<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14z"/>`,search:`<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>`,upload:`<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>`,download:`<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>`,close:`<path d="M6 6l12 12"/><path d="M18 6 6 18"/>`,home:`<path d="M3 12 12 4l9 8"/><path d="M5 10v10h14V10"/>`,plus:`<path d="M12 5v14"/><path d="M5 12h14"/>`};
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${p[n]||''}</svg>`;}
function ava(name='?',size=32){const bgs=[['#fde8f0','#f5b8ce'],['#c7d9ff','#8ea8e8'],['#d4f1e3','#7fc9a4'],['#ffe4cc','#e8a76f'],['#e9d7fb','#b48de0'],['#fff4b8','#e6c84d']];const p=(name||'?').split(' ');const init=(p[0][0]+(p[1]?.[0]||'')).toUpperCase();let h=0;for(let i=0;i<(name||'').length;i++)h=(h*31+name.charCodeAt(i))|0;const[bg,fg]=bgs[Math.abs(h)%bgs.length];return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:linear-gradient(135deg,${bg},${fg}33);display:inline-flex;align-items:center;justify-content:center;font-size:${size*0.38}px;font-weight:700;color:${fg};flex-shrink:0">${init}</div>`;}
function fmtSize(bytes){if(!bytes)return'Unknown size';if(bytes>1048576)return(bytes/1048576).toFixed(1)+' MB';return(bytes/1024).toFixed(0)+' KB';}

function render() {
  document.getElementById('root').innerHTML = `
  <div class="with-sidebar">
    ${sidebarHTML('resources')}
    <div class="snav-content">
  <header class="page-nav">
    <div class="page-nav-inner">
      <div style="display:flex;align-items:center;gap:10px;flex:1;max-width:420px;background:#fff;border:1px solid var(--line-2);border-radius:12px;padding:9px 14px">
        ${ic('search',16,'var(--ink-3)')}
        <input value="${searchVal}" placeholder="Search resources…" style="flex:1;border:0;outline:0;background:transparent;font-size:13.5px" oninput="debounce(this.value)"/>
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="showUpload=true;render()" style="padding:9px 14px;font-size:13px">
        ${ic('upload',15,'white')} Upload
      </button>
    </div>
  </header>

  <div class="page-shell">
    <section class="page-hero" style="margin-bottom:22px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0;flex-wrap:wrap;gap:12px;position:relative;z-index:1">
      <div>
        <div class="tag tag-lav" style="margin-bottom:12px">Shared learning vault</div>
        <h1 class="section-title">Resource Library</h1>
        <p class="section-subtitle">${resources.length} resources shared by the community</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${CATS.map(c=>`<button class="chip-btn${catFilter===c?' active':''}" onclick="catFilter='${c}';loadResources()">${c||'All'}</button>`).join('')}
      </div>
    </div>
    </section>

    <div class="res-grid">
      ${resources.length===0?`<div style="grid-column:1/-1" class="empty-state">${ic('book',40,'var(--ink-3)',1.2)}<p>No resources found. Be the first to share!</p></div>`:
        resources.map(r=>`
          <div class="res-card">
            <div style="display:flex;align-items:flex-start;gap:14px">
              <div style="width:48px;height:48px;border-radius:12px;background:var(--mint);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">
                ${TYPE_ICONS[r.file_type]||'📁'}
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-size:14.5px;font-weight:600;line-height:1.3;margin-bottom:4px">${r.title}</div>
                ${r.course_code?`<span class="tag tag-lav" style="margin-bottom:6px">${r.course_code}</span>`:''}
                ${r.category?`<span class="tag" style="margin-left:4px;margin-bottom:6px">${r.category}</span>`:''}
              </div>
            </div>
            ${r.description?`<p style="margin:0;font-size:13px;color:var(--ink-2);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${r.description}</p>`:''}
            <div style="display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--line)">
              <div style="display:flex;align-items:center;gap:8px">
                ${ava(r.uploader_name,24)}
                <div>
                  <div style="font-size:12px;font-weight:500">${r.uploader_name}</div>
                  <div style="font-size:11px;color:var(--ink-3)">${fmtSize(r.file_size)} · ${r.downloads_count} downloads</div>
                </div>
              </div>
              <a href="/api/resources/${r.id}/download" class="btn btn-ghost" style="padding:7px 12px;font-size:12.5px" target="_blank">
                ${ic('download',13)} Download
              </a>
            </div>
          </div>`).join('')}
    </div>
  </div>

  <!-- Upload modal -->
  ${showUpload?`
  <div class="upload-modal-overlay fade-in" id="up-overlay" onclick="if(event.target.id==='up-overlay'){showUpload=false;render()}">
    <div class="card fade-up" style="width:100%;max-width:540px;padding:0;box-shadow:var(--shadow-lg);overflow:hidden">
      <div style="padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between">
        <div class="serif" style="font-size:22px">Upload a Resource</div>
        <button class="chip-btn" onclick="showUpload=false;render()" style="padding:6px">${ic('close',14)}</button>
      </div>
      <form id="upload-form" onsubmit="handleUpload(event)" style="padding:22px;display:flex;flex-direction:column;gap:12px">
        <input name="title" class="input" placeholder="Title *" required style="padding:11px 14px;font-size:14px"/>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <select name="category" class="input" style="padding:11px 14px;font-size:14px">
            ${CATS.filter(c=>c).map(c=>`<option>${c}</option>`).join('')}
          </select>
          <input name="course_code" class="input" placeholder="Course code (optional)" style="padding:11px 14px;font-size:14px"/>
        </div>
        <textarea name="description" class="input" rows="3" placeholder="Brief description…" style="resize:vertical;font-size:14px"></textarea>
        <div style="border:2px dashed var(--line-2);border-radius:12px;padding:24px;text-align:center">
          <input id="file-input" name="file" type="file" style="display:none" onchange="document.getElementById('file-label').textContent=this.files[0]?.name||'No file chosen'"/>
          <div style="font-size:28px;margin-bottom:8px">${ic('upload',28,'var(--ink-3)',1.5)}</div>
          <label for="file-input" style="cursor:pointer;font-size:14px;font-weight:600;color:var(--accent-ink)">Choose a file</label>
          <div id="file-label" style="font-size:12.5px;color:var(--ink-3);margin-top:4px">No file chosen</div>
        </div>
        <button type="submit" class="btn btn-primary" style="padding:13px">
          ${uploading?'<span class="spinner"></span>':ic('upload',14,'white')+' Upload resource'}
        </button>
      </form>
    </div>
  </div>`:''}
  </div></div>`;
}

async function handleUpload(e) {
  e.preventDefault();
  const form = new FormData(e.target);
  uploading = true; render();
  try {
    await pb.upload('/resources', form);
    showUpload = false;
    await loadResources();
    showToast('Resource uploaded!');
  } catch(err) { showToast('Upload failed: '+err.message); }
  finally { uploading = false; render(); }
}

async function loadResources() {
  const q = new URLSearchParams();
  if (catFilter) q.set('category', catFilter);
  if (searchVal) q.set('search', searchVal);
  try { resources = await pb.get('/resources?' + q); } catch(e) {}
  render();
}

let st;
function debounce(v){clearTimeout(st);searchVal=v;st=setTimeout(loadResources,400);}

render();
loadResources();
</script>
</body>
</html>
