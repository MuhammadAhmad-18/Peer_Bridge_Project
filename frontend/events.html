<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Events – Peer Bridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/shared.css"/>
<style>
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.event-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .15s,transform .15s}
.event-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
</style>
</head>
<body>
<div id="root"></div>
<script src="/js/api.js"></script>
<script>
pb.requireAuth();
const me = pb.getUser();
let events=[], catFilter='', showCreate=false;
const CATS=['','Academic','Career','Society','Workshop','Other'];
const CAT_COLORS={Academic:'#c7d9ff',Career:'#fde8f0',Society:'#d4f1e3',Workshop:'#ffe4cc',Other:'#e9d7fb'};

function ic(n,sz=18,col='currentColor',sw=1.7){const p={calendar:`<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/>`,home:`<path d="M3 12 12 4l9 8"/><path d="M5 10v10h14V10"/>`,plus:`<path d="M12 5v14"/><path d="M5 12h14"/>`,close:`<path d="M6 6l12 12"/><path d="M18 6 6 18"/>`,map:`<path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z"/><path d="M9 3v15m6-12v15"/>`,clock:`<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>`,user:`<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>`};
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${p[n]||''}</svg>`;}
function ava(name='?',size=32){const bgs=[['#fde8f0','#f5b8ce'],['#c7d9ff','#8ea8e8'],['#d4f1e3','#7fc9a4'],['#ffe4cc','#e8a76f'],['#e9d7fb','#b48de0'],['#fff4b8','#e6c84d']];const p=(name||'?').split(' ');const init=(p[0][0]+(p[1]?.[0]||'')).toUpperCase();let h=0;for(let i=0;i<(name||'').length;i++)h=(h*31+name.charCodeAt(i))|0;const[bg,fg]=bgs[Math.abs(h)%bgs.length];return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:linear-gradient(135deg,${bg},${fg}33);display:inline-flex;align-items:center;justify-content:center;font-size:${size*0.38}px;font-weight:700;color:${fg};flex-shrink:0">${init}</div>`;}

function render() {
  document.getElementById('root').innerHTML = `
  <div class="with-sidebar">
    ${sidebarHTML('events')}
    <div class="snav-content">
  <header class="page-nav">
    <div class="page-nav-inner">
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="showCreate=true;render()" style="padding:9px 14px;font-size:13px">
        ${ic('plus',15,'white')} Add event
      </button>
    </div>
  </header>

  <div class="page-shell">
    <section class="page-hero" style="margin-bottom:22px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0;flex-wrap:wrap;gap:12px;position:relative;z-index:1">
      <div>
        <div class="tag tag-lav" style="margin-bottom:12px">Campus calendar</div>
        <h1 class="section-title">Events & Societies</h1>
        <p class="section-subtitle">${events.length} upcoming events</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${CATS.map(c=>`<button class="chip-btn${catFilter===c?' active':''}" onclick="catFilter='${c}';loadEvents()">${c||'All'}</button>`).join('')}
      </div>
    </div>
    </section>

    <div class="events-grid">
      ${events.length===0?`<div style="grid-column:1/-1" class="empty-state">${ic('calendar',40,'var(--ink-3)',1.2)}<p>No upcoming events. Add one!</p></div>`:
        events.map(eventCard).join('')}
    </div>
  </div>

  <!-- Create modal -->
  ${showCreate?`
  <div style="position:fixed;inset:0;z-index:50;background:rgba(26,31,58,.25);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px" id="create-overlay" onclick="if(event.target.id==='create-overlay'){showCreate=false;render()}">
    <div class="card fade-up" style="width:100%;max-width:520px;padding:0;box-shadow:var(--shadow-lg);overflow:hidden">
      <div style="padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between">
        <div class="serif" style="font-size:22px">Create Event</div>
        <button class="chip-btn" onclick="showCreate=false;render()" style="padding:6px">${ic('close',14)}</button>
      </div>
      <form id="event-form" onsubmit="handleCreate(event)" style="padding:22px;display:flex;flex-direction:column;gap:12px">
        <input name="title" class="input" placeholder="Event title *" required style="font-size:15px;padding:12px 14px"/>
        <textarea name="description" class="input" rows="3" placeholder="Description…" style="resize:vertical;font-size:14px"></textarea>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <input name="event_date" class="input" type="date" required style="padding:11px 14px;font-size:14px"/>
          <input name="event_time" class="input" type="time" style="padding:11px 14px;font-size:14px"/>
        </div>
        <input name="venue" class="input" placeholder="Venue" style="padding:11px 14px;font-size:14px"/>
        <select name="category" class="input" style="padding:11px 14px;font-size:14px">
          ${CATS.filter(c=>c).map(c=>`<option>${c}</option>`).join('')}
        </select>
        <button type="submit" class="btn btn-primary" style="padding:13px">${ic('plus',14,'white')} Create Event</button>
      </form>
    </div>
  </div>`:''}
  </div></div>`;
}

function eventCard(e) {
  const d = new Date(e.event_date);
  const month = d.toLocaleString('en',{month:'short'}).toUpperCase();
  const day = d.getDate();
  const bg = CAT_COLORS[e.category] || '#e9d7fb';
  const timeFmt = e.event_time ? new Date('1970-01-01T'+e.event_time).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}) : '';

  return `
  <div class="event-card">
    <div style="background:${bg};padding:20px 22px;display:flex;align-items:center;gap:16px">
      <div style="text-align:center;min-width:52px">
        <div class="serif" style="font-size:36px;line-height:1;font-weight:400">${day}</div>
        <div style="font-size:10px;letter-spacing:0.1em;font-weight:700;color:var(--ink-2);margin-top:2px">${month}</div>
      </div>
      <div style="flex:1">
        <div class="serif" style="font-size:20px;line-height:1.2;margin-bottom:4px">${e.title}</div>
        <span class="tag" style="font-size:11px;padding:3px 8px">${e.category||'Event'}</span>
      </div>
    </div>
    <div style="padding:16px 22px">
      ${e.description?`<p style="margin:0 0 12px;font-size:13.5px;color:var(--ink-2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${e.description}</p>`:''}
      <div style="display:flex;flex-direction:column;gap:6px">
        ${e.venue?`<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2)">${ic('map',14,'var(--ink-3)')} ${e.venue}</div>`:''}
        ${timeFmt?`<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2)">${ic('clock',14,'var(--ink-3)')} ${timeFmt}</div>`:''}
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
          ${ava(e.organizer_name,22)}
          <span style="font-size:12px;color:var(--ink-3)">by ${e.organizer_name}</span>
        </div>
      </div>
    </div>
  </div>`;
}

async function handleCreate(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd);
  try {
    await pb.post('/events', body);
    showCreate = false;
    await loadEvents();
    showToast('Event created!');
  } catch(err) { showToast('Failed: '+err.message); }
}

async function loadEvents() {
  const q = new URLSearchParams({ upcoming: 'true' });
  if (catFilter) q.set('category', catFilter);
  try { events = await pb.get('/events?' + q); } catch(e) {}
  render();
}

render();
loadEvents();
</script>
</body>
</html>
